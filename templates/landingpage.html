<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Database System</title>

<link rel="icon" type="image/x-icon"
      href="{{ url_for('static', filename='favicon.ico') }}">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter,Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f5f7fb;
    overflow:hidden;
    padding:20px;
}

/* Main container */

.landing{
    text-align:center;
    width:100%;
    max-width:1200px;
    animation:fadeIn 1.2s ease;
}

/* Logo */

.logo{
    width:110px;
    height:110px;
    margin:auto;
    margin-bottom:35px;

    border-radius:24px;

    display:flex;
    justify-content:center;
    align-items:center;

    animation:floatLogo 4s ease-in-out infinite;
}

.logo img{
    width:100%;
    height:100%;
    object-fit:contain;
}

/* Title */

h1{
    font-size:clamp(42px,5vw,76px);
    font-weight:800;
    color:#090d18;
    margin-bottom:18px;
    letter-spacing:-2px;
}

/* Subtitle */

.subtitle{
    font-size:clamp(18px,2vw,28px);
    color:#94a3b8;
    margin-bottom:50px;
}

/* Proceed button */

.proceed-btn{

    border:none;
    outline:none;

    padding:18px 40px;

    border-radius:18px;

    font-size:18px;
    font-weight:700;

    cursor:pointer;

    color:white;

    background:linear-gradient(
    135deg,
    #2563eb,
    #4f46e5
    );

    transition:.4s;
}

.proceed-btn:hover{

    transform:
    translateY(-5px);

    box-shadow:
    0 20px 35px
    rgba(37,99,235,.25);

}

.proceed-btn:active{

    transform:
    scale(.97);

}

/* Animation */

@keyframes fadeIn{

    from{
        opacity:0;
        transform:
        translateY(50px);
    }

    to{
        opacity:1;
        transform:
        translateY(0px);
    }

}

@keyframes floatLogo{

    0%,100%{

        transform:
        translateY(0);

    }

    50%{

        transform:
        translateY(-10px);

    }

}

/* Mobile */

@media(max-width:768px){

    .logo{

        width:90px;
        height:90px;
    }

    .proceed-btn{

        width:100%;
        max-width:300px;
    }

}

</style>
</head>

<body>

<div class="landing">

    <div class="logo">
        <img src="{{ url_for('static', filename='logo.png') }}"
             alt="Company Logo">
    </div>

    <h1>
        Student Database System
    </h1>

    <div class="subtitle">
        Student enrollments, courses, and records
    </div>

    <button
        class="proceed-btn"
        onclick="goNext()">

        Proceed →
    </button>

</div>

<script>

function goNext(){

    window.location.href="/dashboard";

}

</script>

</body>
</html>
