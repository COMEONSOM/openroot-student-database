<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Viewer</title>
     <link rel="icon" type="image/x-icon"
          href="{{ url_for('static', filename='favicon.ico') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='global.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='database.css') }}">
</head>
<body>

<div class="container">

    <a href="#" class="back-btn"  onclick="goDashboard(); return false;">
        <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
        </svg>
        Back to Dashboard
    </a>

    <div class="page-header">
        <h2 class="page-title">Database Viewer</h2>
        <p class="page-subtitle">
            Live view of joined student and course records.
        </p>
    </div>

    <div class="table-card">

        <div class="table-header">
            <div class="table-header-left">
                <div class="table-header-icon icon-blue">🎓</div>
                <div>
                    <h2>Student Records</h2>
                    <p>Unified view from students + courses</p>
                </div>
            </div>

            <span class="row-count" id="recordCount">0 rows</span>
        </div>

        <div class="table-toolbar">
            <div class="search-input-wrap">
                <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="#94a3b8" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="M21 21l-4.35-4.35"></path>
                </svg>
                <input type="text" id="recordSearch" placeholder="Search by name, mobile, email, course…">
            </div>

            <button type="button" id="refreshDatabaseBtn">
                Refresh
            </button>
        </div>

        <div class="table-scroll">
            <table>
                <thead>
                    <tr>
                        <th>Enrollment</th>
                        <th>Name</th>
                        <th>Mobile</th>
                        <th>Email</th>
                        <th>Course</th>
                        <th>Fees</th>
                        <th>Paid</th>
                        <th>Duration</th>
                    </tr>
                </thead>

                <tbody id="databaseTableBody">
                    <tr>
                        <td colspan="8" class="empty-state">
                            <p>Loading database records...</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='script.js') }}"></script>
<script>
function goDashboard(){
    window.location.replace("/dashboard");
}
</script>
</body>
</html>
