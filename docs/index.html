<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Database System | Openroot Systems</title>

<meta name="description"
      content="Student Database Management System for managing student enrollments, courses, and records.">

<link rel="icon"
      type="image/x-icon"
      href="./static/favicon.ico">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Inter, Arial, sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#ffffff;
    padding:20px;
}

.landing{
    width:100%;
    max-width:1200px;
    text-align:center;
    animation:fadeIn 0.9s ease;
}

.logo{
    width:110px;
    height:110px;
    margin:0 auto 35px;
    display:flex;
    justify-content:center;
    align-items:center;
}

.logo img{
    width:100%;
    height:100%;
    object-fit:contain;
    user-select:none;
    pointer-events:none;
}

h1{
    font-size:clamp(42px,5vw,76px);
    font-weight:800;
    color:#090d18;
    letter-spacing:-2px;
    margin-bottom:18px;
}

.subtitle{
    font-size:clamp(18px,2vw,28px);
    color:#94a3b8;
    margin-bottom:50px;
}

.proceed-btn{
    border:none;
    outline:none;

    padding:18px 40px;

    border-radius:18px;

    font-size:18px;
    font-weight:700;

    cursor:pointer;

    color:#fff;

    background:linear-gradient(
        135deg,
        #2563eb,
        #4f46e5
    );

    transition:
        transform .25s ease,
        box-shadow .25s ease;
}

.proceed-btn:hover{
    transform:translateX(2px);
}

.proceed-btn:active{
    transform:scale(.97);
}

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(40px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

@media(max-width:768px){

    .logo{
        width:90px;
        height:90px;
    }

    .proceed-btn{
        width:100%;
        max-width:300px;
    }

    h1{
        letter-spacing:-1px;
    }
}

</style>
</head>

<body>

<div class="landing">

    <div class="logo">
        <img
            src="./static/logo.png"
            alt="Openroot Systems Logo">
    </div>

    <h1>
        Student Database System
    </h1>

    <div class="subtitle">
        Student enrollments, courses, and records
    </div>

    <button
        type="button"
        class="proceed-btn"
        onclick="goNext()">

        Proceed →
    </button>

</div>

<script>

function goNext() {
    window.location.href = "./dashboard.html";
}

</script>

</body>
</html>
